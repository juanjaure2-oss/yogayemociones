/* ─── Intersection Observer hook ─────────────────────────────────────── */
function useFadeIn() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.fiu').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

/* ─── Testimonios ─────────────────────────────────────────────────────── */
function Testimonios() {
  const [cur, setCur] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [dragStart, setDragStart] = useState(0);
  const timerRef = useRef(null);

  const list = [
    {
      txt:'Mi hija Francina de 5 años va a yoga desde hace 2 años y la experiencia es muy positiva. Una de las cosas más lindas que aprendió es a relajarse para dormir: pone su música de yoga y en pocos minutos se duerme sola. Una actividad hermosa que les ayuda a relajarse desde chiquitos.',
      name:'Analía Petribiasi', role:'Mamá de Francina, 5 años', init:'AP', color:'#1BBCB7',
    },
    {
      txt:'Mi hija se llama Juliana y le encanta ir a yoga. Disminuye sus niveles de ansiedad y la ayuda a conectar con sus emociones.',
      name:'Olga Gaitán', role:'Mamá de Juliana', init:'OG', color:'#F07B6A',
    },
    {
      txt:'Mi hija Pilar, de 7 años, ama su clase de Yoga. No falta nunca, porque es su momento preferido de la semana. No solo le ayuda a estar más tranquila, sino que comienza a conocer los rituales que le hacen bien (¡y hasta nos enseña sus técnicas en casa! ☺️).',
      name:'Lorena López', role:'Mamá de Pilar, 7 años', init:'LL', color:'#2D6BBE',
    },
    {
      txt:'Soy mamá de Alfonsina de 7 años, ella está feliz de comenzar su tercer año en Yoga con la seño Cari ❤️ Cuando le pregunté qué le gusta me dijo que TODO: meditar, bailar, dibujar, relajar... Como papás nos encanta que asista porque aprenden a relajarse y lograr la calma cuando es necesario.',
      name:'Ana Paula Croatto', role:'Mamá de Alfonsina, 7 años', init:'AC', color:'#F06A8E',
    },
    {
      txt:'A mi hijo le gusta el taller de yoga y emociones porque es un espacio donde se siente cómodo, contenido y libre para expresarse. A través del movimiento, la respiración y los juegos, logra relajarse y conectarse con lo que siente. Además, disfruta compartir con otros niños en un ambiente respetuoso, lo que fortalece su confianza y bienestar.',
      name:'Stefania Lezana', role:'Mamá de Julián', init:'SL', color:'#F5A623',
    },
  ];

  const total = list.length;
  const prev = () => { resetTimer(); setCur(c => (c - 1 + total) % total); };
  const next = () => { resetTimer(); setCur(c => (c + 1) % total); };

  function resetTimer() {
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => setCur(c => (c + 1) % total), 5000);
  }

  useEffect(() => {
    timerRef.current = setInterval(() => setCur(c => (c + 1) % total), 5000);
    return () => clearInterval(timerRef.current);
  }, []);

  // touch/drag swipe
  const onPointerDown = (e) => { setDragging(true); setDragStart(e.clientX); };
  const onPointerUp   = (e) => {
    if (!dragging) return;
    setDragging(false);
    const diff = dragStart - e.clientX;
    if (Math.abs(diff) > 50) diff > 0 ? next() : prev();
  };

  return (
    <section id="testimonios" className="py-24 bg-bg overflow-hidden">
      <div className="max-w-3xl mx-auto px-6">
        <div className="text-center mb-14 fiu">
          <p className="text-teal font-bold text-xs uppercase tracking-[.18em] mb-3">Testimonios</p>
          <h2 className="text-4xl md:text-5xl font-black text-[#222] mb-4">Lo que dicen las familias ❤️</h2>
        </div>

        {/* Slider */}
        <div className="relative fiu fiu-d1"
          onPointerDown={onPointerDown} onPointerUp={onPointerUp} style={{touchAction:'pan-y',userSelect:'none'}}>

          {/* Card */}
          <div className="bg-white rounded-3xl p-8 md:p-10 shadow-lg border-t-4 min-h-[260px] flex flex-col justify-between transition-all duration-300"
            style={{borderColor: list[cur].color}}>
            <div>
              <div className="text-6xl font-black leading-none mb-4" style={{color: list[cur].color + '22'}}>"</div>

            <div className="flex items-center gap-3 mt-8">

                <p className="text-gray-400 text-xs">{list[cur].role}</p>
              </div>
            </div>
          </div>

          {/* Prev / Next arrows */}
          <button onClick={prev} aria-label="Anterior"
            className="absolute -left-4 md:-left-6 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center hover:bg-gray-50 transition-colors border border-gray-100">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button onClick={next} aria-label="Siguiente"
            className="absolute -right-4 md:-right-6 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center hover:bg-gray-50 transition-colors border border-gray-100">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>

        {/* Dots */}
        <div className="flex items-center justify-center gap-2 mt-7">
          {list.map((_,i) => (
            <button key={i} onClick={() => { resetTimer(); setCur(i); }} aria-label={`Testimonio ${i+1}`}
              className="rounded-full transition-all duration-300"
              style={{
                width: cur === i ? 24 : 8,
                height: 8,
                background: cur === i ? list[i].color : '#CBD5E1',
              }}/>
          ))}
        </div>
      </div>
    </section>
  );
}
